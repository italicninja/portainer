services:
  mc:
    image: itzg/minecraft-server:${IMAGE_TAG:-java17}
    container_name: minecraft-age-of-fate
    volumes:
      - minecraft_age_of_fate_data:/data
    environment:
      EULA: "true"
      MOD_PLATFORM: AUTO_CURSEFORGE
      DEBUG: "${DEBUG:-false}"
      CF_API_KEY: ${CF_API_KEY}
      CF_SLUG: age-of-fate
      CURSEFORGE_FILES: biomesize
      INIT_MEMORY: 22G
      MAX_MEMORY: 22G
      USE_AIKAR_FLAGS: "false"
      JVM_XX_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=30
        -XX:G1MaxNewSizePercent=40
        -XX:G1HeapRegionSize=8M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:InitiatingHeapOccupancyPercent=15
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1
      MOTD: Running %MODPACK_NAME% version %env:MODPACK_VERSION%
      LEVEL: age-of-fate-world
      MAX_TICK_TIME: "-1"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "5"
      RCON_PASSWORD: ${RCON_PASSWORD}
      DIFFICULTY: "hard"
      CUSTOM_SERVER_PROPERTIES: |-
        allow-flight=true
        spawn-protection=false
      SYNC_CHUNK_WRITES: "false"
      RCON_CMDS_STARTUP: |-
        /spark profiler cancel
      #RCON_CMDS_FIRST_CONNECT:
      #RCON_CMDS_LAST_DISCONNECT:
    ports:
      - "25565:25565"
      - "127.0.0.1:25575:25575"
    networks:
      - minecraft_network
    healthcheck:
      test: ["CMD", "mc-status", "--host", "localhost"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 900s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - "com.docker.compose.project=games"
      - "com.docker.compose.service=minecraft-age-of-fate"
    restart: unless-stopped

networks:
  minecraft_network:
    driver: bridge

volumes:
  minecraft_age_of_fate_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/minecraft-age-of-fate
  minecraft_age_of_fate_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /backup/minecraft/minecraft-age-of-fate

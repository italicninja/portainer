services:
  mc:
    image: itzg/minecraft-server:${IMAGE_TAG:-latest}
    container_name: minecraft-age-of-fate
    volumes:
      - minecraft_age_of_fate_data:/data
    environment:
      EULA: "true"
      MOD_PLATFORM: AUTO_CURSEFORGE
      DEBUG: "${DEBUG:-false}"
      CF_API_KEY: ${CF_API_KEY}
      CF_SLUG: age-of-fate
      CURSEFORGE_FILES: modmenu, fancymenu
      INIT_MEMORY: 8G
      MAX_MEMORY: 24G
      USE_AIKAR_FLAGS: true
      MOTD: Running %MODPACK_NAME% version %env:MODPACK_VERSION%
      LEVEL: age-of-fate-world
      LEVEL_TYPE: minecraft:large_biomes
      RCON_PASSWORD: ${RCON_PASSWORD}
      CUSTOM_SERVER_PROPERTIES: |-
        allow-flight=true
        spawn-protection=false
        white-list=true
        enforce-whitelist=true
      RCON_CMDS_STARTUP:  |-
        /gamerule doFireTick false
        /gamerule mobGriefing false
      #RCON_CMDS_FIRST_CONNECT:
      #RCON_CMDS_LAST_DISCONNECT:
    ports:
      - "25565:25565"
      - "127.0.0.1:25575:25575"
    networks:
      - minecraft_network
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 24G
        reservations:
          memory: 8G
    healthcheck:
      test: ["CMD", "mc-status", "--host", "localhost"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      - "com.docker.compose.project=games"
      - "com.docker.compose.service=minecraft-age-of-fate"
    restart: unless-stopped

  mc-backup:
    image: instrumentisto/rsync-ssh:alpine
    container_name: minecraft-age-of-fate-backup
    depends_on:
      - mc
    environment:
      # Advanced Backups mod handles the actual world snapshotting + RCON pause;
      # this sidecar just mirrors its output off-volume on an interval.
      BACKUP_INTERVAL: "7200"          # seconds between rsync runs (2h)
      PRUNE_DAYS: "7"                  # delete mirrored archives older than N days
      SOURCE: "/data/backups/"         # Advanced Backups output dir inside the world data
      DEST: "/backup/current/"         # rsync mirror destination
    volumes:
      - minecraft_age_of_fate_data:/data:ro
      - minecraft_age_of_fate_backups:/backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p "$$DEST"
        while true; do
          echo "[$$(date -Iseconds)] rsync $$SOURCE -> $$DEST"
          if [ -d "$$SOURCE" ]; then
            rsync -a --delete \
              --exclude='*.jar' --exclude='cache' --exclude='logs' \
              "$$SOURCE" "$$DEST" || echo "[$$(date -Iseconds)] rsync failed"
            find "$$DEST" -mindepth 1 -maxdepth 1 -mtime +"$$PRUNE_DAYS" -exec rm -rf {} +
          else
            echo "[$$(date -Iseconds)] source $$SOURCE not present yet, skipping"
          fi
          echo "[$$(date -Iseconds)] done, sleeping $${BACKUP_INTERVAL}s"
          sleep "$$BACKUP_INTERVAL"
        done
    networks:
      - minecraft_network
    labels:
      - "com.docker.compose.project=games"
      - "com.docker.compose.service=minecraft-age-of-fate-backup"
    restart: unless-stopped

networks:
  minecraft_network:
    driver: bridge

volumes:
  minecraft_age_of_fate_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/minecraft-age-of-fate
  minecraft_age_of_fate_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /backup/minecraft/minecraft-age-of-fate
